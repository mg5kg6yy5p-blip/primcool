<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeCool Services Ltd.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #0B2545;
      --teal:  #22A08A;
      --slate: #5A6472;
      --off:   #F4F6F8;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--navy);
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .wordmark {
      font-family: 'DM Mono', monospace;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .wordmark span {
      color: var(--teal);
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--teal);
      margin: 2rem auto;
    }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.6rem, 1.5vw, 0.7rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 3rem;
    }

    .launch {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .launch-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 3rem;
    }

    .register {
      font-size: 0.85rem;
      color: var(--slate);
      margin-bottom: 0.75rem;
      letter-spacing: 0.02em;
    }

    .email-link {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: var(--teal);
      text-decoration: none;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(34,160,138,0.3);
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .email-link:hover {
      border-color: var(--teal);
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(90,100,114,0.5);
    }
  </style>
</head>
<body>

  <div class="wordmark">Prime<span>Cool</span> Services Ltd.</div>
  <div class="tagline">Kingston &amp; St. Andrew, Jamaica</div>

  <div class="divider"></div>

  <div class="launch">2028</div>
  <div class="launch-label">Launching</div>

  <p class="register">Register your interest</p>
  <a href="mailto:info@primecoolservices.com" class="email-link">info@primecoolservices.com</a>

  <div class="footer">PrimeCool Services Ltd. &mdash; Pre-Launch</div>

</body>
</html>
